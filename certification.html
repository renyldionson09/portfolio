 <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .cert-image {
            cursor: zoom-in;
        }
        .cert-title a {
            color: inherit;
            text-decoration: none;
            border-bottom: none;
            transition: opacity 0.2s;
        }
        .cert-title a:hover {
            opacity: 0.7;
        }
    </style>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">RD</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span class="hamburger"></span>
            </button>
            <ul class="nav-menu">

    <section class="certifications-section">
        <div class="container">
            <br>
            <br>
            <h1 class="section-title">My <span class="highlight">Certifications</span></h1>

            <div class="certifications-grid">
                <div class="certification-card">
                    <img class="cert-image" src="images/Networking_Basic.png" alt="Networking Basic Certificate" class="cert-image">
                    <h3 class="cert-title">
                        <a href="https://www.credly.com/badges/84be6d4d-f89f-49f9-9856-ce24e7595746" target="_blank" rel="noopener">
                            NETWORKING BASIC
                        </a>
                    </h3>
                </div>

                <div class="certification-card">
                    <img class="cert-image" src="images/Python_Essentials.png" alt="Python Essential 1 Certificate" class="cert-image">
                    <h3 class="cert-title">
                        <a href="https://www.credly.com/badges/3ae2628d-2088-4975-afd2-64bfd514fe93" target="_blank" rel="noopener">
                            PYTHON ESSENTIAL 1
                        </a>
                    </h3>
                </div>
                <div class="certification-card">
                    <img class="cert-image" src="images/C-Cert.png"alt="Codechum Certificate" class="cert-image">
                    <h3 class="cert-title">
                        <a href="https://app.codechum.com/certificates/6059" target="_blank" rel="noopener">
                            CODECHUM CERTIFICATE
                        </a>
                    </h3>
                </div>
                <div class="certification-card">
                    <img class="cert-image" src="images/software_engineering.png" alt="Software Engineering Certificate" class="cert-image">
                    <h3 class="cert-title">
                        <a href="https://learn.saylor.org/admin/tool/certificate/index.php?code=7197250394RD" target="_blank" rel="noopener">
                            SOFTWARE ENGINEERING
                        </a>
                    </h3>
                </div>

                <div class="certification-card">
                    <img class="cert-image" src="images/saylor2.png" alt="Introduction to Database Systems Certificate" class="cert-image">
                    <h3 class="cert-title">
                        <a href="https://learn.saylor.org/admin/tool/certificate/index.php?code=1957047708RD" target="_blank" rel="noopener">
                            DATABASE SYSTEMS
                        </a>
                    </h3>
                </div>
            </div>
        </div>
    </section>

    <div class="modal" id="certModal">
        <span class="modal-close" id="modalClose">&times;</span>
        <img class="modal-content" id="modalImg" src="" alt="">
        <div class="modal-caption" id="modalCaption"></div>
    </div>
